# cbindgen configuration for bignum-rs
# Generates C headers from Rust FFI code

# Basic parsing settings
language = "C"
pragma_once = true
include_version = true
tab_width = 4

# Include dependencies
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_guard = "BIGNUM_RS_GENERATED_H"
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]

# C++ compatibility
cpp_compat = true
after_includes = """
#ifdef __cplusplus
extern "C" {
#endif
"""

trailer = """
#ifdef __cplusplus
}
#endif
"""

# Export settings
[export]
include = []
exclude = []
item_types = ["globals", "enums", "structs", "unions", "typedefs", "opaque", "functions", "constants"]

# Constants
[defines]
"KC_OK" = "0x00000000"
"KCERR_INVALID_PARAMETER" = "0x00008003"
"BN_BITS" = "28"
"MAX_BN_ELEMENTS" = "80"

# Function renaming
[export.rename]
"bignum_rs_BNAdd" = "BNAdd"
"bignum_rs_BNLoad" = "BNLoad"
"bignum_rs_BNStore" = "BNStore"
"bignum_rs_BNCopy" = "BNCopy"
"bignum_rs_BNCompare" = "BNCompare"
"bignum_rs_BNSecureCompare" = "BNSecureCompare"
"bignum_rs_BNBitCount" = "BNBitCount"
